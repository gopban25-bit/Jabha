<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شقق فخمة للكراء - الجبهة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        .swiper-slide img {
            width: 100%;
            height: 550px;
            object-fit: cover;
            border-radius: 1rem;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-white shadow-sm py-5 px-8 flex justify-between items-center">
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">شقق الجبهة</h1>
        <a href="tel:0673291937" class="bg-black text-white px-6 py-2.5 rounded-full hover:bg-gray-800 transition font-bold shadow-lg">احجز الآن</a>
    </header>

    <section class="max-w-5xl mx-auto py-16 px-4">
        <div class="text-center mb-12">
            <h2 class="text-4xl md:text-5xl font-black text-gray-900 mb-4">اكتشف الفخامة والراحة</h2>
            <p class="text-lg text-gray-500">جولة في شققنا المصممة بعناية لتجربة سكن لا تنسى</p>
        </div>

        <div class="swiper mySwiper shadow-2xl rounded-2xl overflow-hidden border-4 border-white">
            <div class="swiper-wrapper">
                <div class="swiper-slide relative">
                    <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?q=80&w=1200&auto=format&fit=crop" alt="صالون">
                    <div class="absolute bottom-0 w-full bg-gradient-to-t from-black/90 to-transparent p-8 text-white text-right">
                        <h3 class="text-3xl font-bold">صالون عصري ومريح</h3>
                    </div>
                </div>
                <div class="swiper-slide relative">
                    <img src="https://images.unsplash.com/photo-1502672260266-1c1de2d9d344?q=80&w=1200&auto=format&fit=crop" alt="غرفة">
                    <div class="absolute bottom-0 w-full bg-gradient-to-t from-black/90 to-transparent p-8 text-white text-right">
                        <h3 class="text-3xl font-bold">غرفة نوم هادئة</h3>
                    </div>
                </div>
                <div class="swiper-slide relative">
                    <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?q=80&w=1200&auto=format&fit=crop" alt="مطبخ">
                    <div class="absolute bottom-0 w-full bg-gradient-to-t from-black/90 to-transparent p-8 text-white text-right">
                        <h3 class="text-3xl font-bold">مطبخ مجهز بالكامل</h3>
                    </div>
                </div>
            </div>
            <div class="swiper-button-next !text-white"></div>
            <div class="swiper-button-prev !text-white"></div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            spaceBetween: 30,
            effect: "fade", /* هادي هي لي كتعطي ديك الحركة الواعرة ديال الانتقال */
            grabCursor: true,
            loop: true,
            autoplay: {
                delay: 3500,
                disableOnInteraction: false,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
        });
    </script>
</body>
</html>
